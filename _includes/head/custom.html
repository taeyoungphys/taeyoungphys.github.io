<!-- Favicon -->
<link rel="icon" type="image/svg+xml" href="{{ '/assets/images/favicon.svg' | relative_url }}">
<link rel="alternate icon" href="{{ '/assets/images/favicon.png' | relative_url }}">

<!-- ============================================================
     Open Graph / Twitter Card — 링크 미리보기 (KakaoTalk, Slack, X 등)
     ============================================================ -->
{% assign og_image = '/assets/images/og-image.png' | absolute_url %}
{% assign og_title = page.title | default: site.title %}
{% assign og_desc  = page.excerpt | default: site.description | strip_html | strip_newlines | truncate: 160 %}

<meta property="og:site_name" content="{{ site.title }}">
<meta property="og:type" content="{% if page.layout == 'single' and page.url contains '/posts/' %}article{% else %}website{% endif %}">
<meta property="og:title" content="{{ og_title }}">
<meta property="og:description" content="{{ og_desc }}">
<meta property="og:image" content="{{ og_image }}">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:url" content="{{ page.url | absolute_url }}">
<meta property="og:locale" content="ko_KR">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{ og_title }}">
<meta name="twitter:description" content="{{ og_desc }}">
<meta name="twitter:image" content="{{ og_image }}">

<!-- MathJax 3 — LaTeX 수식 렌더링 -->
<script>
  MathJax = {
    tex: {
      inlineMath: [['$', '$'], ['\\(', '\\)']],
      displayMath: [['$$', '$$'], ['\\[', '\\]']],
      processEscapes: true
    },
    options: {
      skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code']
    }
  };
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" async></script>
