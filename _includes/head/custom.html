<!-- Favicon -->
<link rel="icon" type="image/svg+xml" href="{{ '/assets/images/favicon.svg' | relative_url }}">
<link rel="alternate icon" href="{{ '/assets/images/favicon.png' | relative_url }}">

<!-- ============================================================
     OG image 보조 메타 (MM 의 seo.html 이 og:image 까지는 만들어 주지만
     너비/높이는 안 넣음 → KakaoTalk·Slack 일부에서 미리보기 잘리는 경우가
     있어 명시적으로 추가)
     ============================================================ -->
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:image:alt" content="{{ site.title }}">

<!-- MathJax 3 — LaTeX 수식 렌더링 -->
<script>
  MathJax = {
    tex: {
      inlineMath: [['$', '$'], ['\\(', '\\)']],
      displayMath: [['$$', '$$'], ['\\[', '\\]']],
      processEscapes: true
    },
    options: {
      skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code']
    }
  };
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" async></script>
