<script>
(function() {
  const SIZE = 15;
  const DIRS = [[1,0],[0,1],[1,1],[1,-1]];

  const I18N = {
    ko: {
      blackTurn: '흑(선공)의 차례',
      whiteTurn: '백(후공)의 차례',
      blackWin: '🎉 흑(선공) 승!',
      whiteWin: '🎉 백(후공) 승!',
      forbidden: '금수입니다 (33 / 44 / 6목 금지)',
      historyTitle: '이전 수 히스토리',
      noHistory: '착수 기록 없음',
      reset: '재시작',
      undo: '← 뒤로',
      redo: '앞으로 →',
      settings: '설정',
      startTitle: '오목 (Gomoku)',
      startSubtitle: '규칙과 언어를 선택하세요',
      ruleLabel: '규칙',
      ruleFree: '일반룰',
      ruleRenju: '렌주룰 (권장)',
      langLabel: '언어 / Language',
      startBtn: '게임 시작',
      rNameFree: '일반룰',
      rNameRenju: '렌주룰',
      rulePrefix: '규칙: ',
      confirmAbandon: '진행 중인 게임을 포기하고 설정 화면으로 돌아갈까요?',
      // AI 모드
      modeLabel: '모드',
      modePvP: '사람 vs 사람',
      modePvC: '사람 vs 컴퓨터',
      aiColorLabel: '컴퓨터 색깔',
      aiColorBlack: '흑(선공)',
      aiColorWhite: '백(후공)',
      aiColorRandom: '랜덤',
      aiDiffLabel: '컴퓨터 난이도',
      aiDiffEasy: '쉬움',
      aiDiffMedium: '보통',
      aiDiffHard: '어려움',
      winProbLabel: 'AI 승률 표시',
      winProbLabel2: 'AI 추정 승률',
      show: '보임',
      hide: '숨김',
      aiThinking: '컴퓨터가 생각 중',
      aiTimeout: '시간 초과 — 현재까지 최선 수로 진행'
    },
    en: {
      blackTurn: "Black's turn (first player)",
      whiteTurn: "White's turn (second player)",
      blackWin: '🎉 Black (first) wins!',
      whiteWin: '🎉 White (second) wins!',
      forbidden: 'Forbidden move (3-3 / 4-4 / overline)',
      historyTitle: 'Move history',
      noHistory: 'No moves yet',
      reset: 'Restart',
      undo: '← Undo',
      redo: 'Redo →',
      settings: 'Settings',
      startTitle: 'Gomoku',
      startSubtitle: 'Pick rule and language',
      ruleLabel: 'Rule',
      ruleFree: 'Free rule',
      ruleRenju: 'Renju (recommended)',
      langLabel: 'Language',
      startBtn: 'Start game',
      rNameFree: 'Free',
      rNameRenju: 'Renju',
      rulePrefix: 'Rule: ',
      confirmAbandon: 'Abandon current game and return to settings?',
      // AI mode
      modeLabel: 'Mode',
      modePvP: 'Player vs Player',
      modePvC: 'Player vs Computer',
      aiColorLabel: 'Computer color',
      aiColorBlack: 'Black (1st)',
      aiColorWhite: 'White (2nd)',
      aiColorRandom: 'Random',
      aiDiffLabel: 'AI difficulty',
      aiDiffEasy: 'Easy',
      aiDiffMedium: 'Medium',
      aiDiffHard: 'Hard',
      winProbLabel: 'Show AI win prob.',
      winProbLabel2: 'AI estimated win prob.',
      show: 'Show',
      hide: 'Hide',
      aiThinking: 'Computer thinking',
      aiTimeout: 'Time out — using best move so far'
    }
  };

  const canvas = document.getElementById('omok-canvas');
  const ctx = canvas.getContext('2d');
  const statusEl = document.getElementById('omok-status');
  const ruleInfoEl = document.getElementById('omok-rule-info');
  const resetBtn = document.getElementById('omok-reset');
  const undoBtn = document.getElementById('omok-undo');
  const redoBtn = document.getElementById('omok-redo');
  const settingsBtn = document.getElementById('omok-settings');
  const histEl = document.getElementById('omok-history');
  const startOverlay = document.getElementById('omok-start');
  const startBtn = document.getElementById('start-btn');
  const pvcOptionsEl = document.getElementById('pvc-options');
  const aiThinkingEl = document.getElementById('ai-thinking');
  const aiProgressEl = document.getElementById('ai-progress');
  const aiWinprobEl = document.getElementById('ai-winprob');
  const aiWinprobValueEl = document.getElementById('ai-winprob-value');
  const aiWinprobFillEl = document.getElementById('ai-winprob-fill');

  let board, history, redoStack, current, gameOver, winner, lastMove;
  let cellSize = 0, padding = 0;
  let statusFlashT = null;
  let renjuMode = true;
  let currentLang = 'ko';
  // AI 모드 관련
  let mode = 'pvp';            // 'pvp' | 'pvc'
  let aiColor = 'W';           // 'B' | 'W'
  let aiDifficulty = 'medium'; // 'easy' | 'medium' | 'hard'
  let showWinProb = true;
  let aiBusy = false;          // AI 가 계산 중인지
  let aiAbort = false;         // 중단 플래그

  const inB = (x,y) => x>=0 && y>=0 && x<SIZE && y<SIZE;
  const t = (key) => (I18N[currentLang][key] !== undefined ? I18N[currentLang][key] : key);

  function applyLang() {
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const k = el.getAttribute('data-i18n');
      el.textContent = t(k);
    });
    if (ruleInfoEl) {
      ruleInfoEl.textContent = t('rulePrefix') + (renjuMode ? t('rNameRenju') : t('rNameFree'));
    }
  }

  function setActiveBtn(group, value) {
    document.querySelectorAll('.opt-btn[data-group="' + group + '"]').forEach(function(b) {
      b.classList.toggle('active', b.dataset.value === value);
    });
  }
  function getActiveValue(group) {
    var b = document.querySelector('.opt-btn[data-group="' + group + '"].active');
    return b ? b.dataset.value : null;
  }

  function showStart() {
    setActiveBtn('rule', renjuMode ? 'renju' : 'free');
    setActiveBtn('lang', currentLang);
    setActiveBtn('mode', mode);
    setActiveBtn('aiColor', aiColor);
    setActiveBtn('aiDiff', aiDifficulty);
    setActiveBtn('winProb', showWinProb ? 'show' : 'hide');
    pvcOptionsEl.style.display = (mode === 'pvc') ? '' : 'none';
    applyLang();
    startOverlay.style.display = 'flex';
  }
  function hideStart() { startOverlay.style.display = 'none'; }

  function init() {
    board = Array.from({length: SIZE}, () => Array(SIZE).fill(null));
    history = [];
    redoStack = [];
    current = 'B';
    gameOver = false;
    winner = null;
    lastMove = null;
    aiAbort = true;       // 진행 중이던 AI 계산 중단
    aiBusy = false;
    if (aiThinkingEl) aiThinkingEl.style.display = 'none';
    if (aiWinprobEl) {
      aiWinprobEl.style.display = (mode === 'pvc' && showWinProb) ? '' : 'none';
      aiWinprobValueEl.textContent = '—';
      aiWinprobFillEl.style.width = '50%';
    }
    render();
  }

  function countConsec(b, x, y, dx, dy, color) {
    let c = 1;
    for (let s=1; s<=5; s++) {
      const nx=x+s*dx, ny=y+s*dy;
      if (inB(nx,ny) && b[ny][nx]===color) c++; else break;
    }
    for (let s=1; s<=5; s++) {
      const nx=x-s*dx, ny=y-s*dy;
      if (inB(nx,ny) && b[ny][nx]===color) c++; else break;
    }
    return c;
  }

  function maxConsec(b, x, y, color) {
    let m = 0;
    for (const [dx,dy] of DIRS) m = Math.max(m, countConsec(b,x,y,dx,dy,color));
    return m;
  }

  function isOpenFourAt(b, x, y, dx, dy, color) {
    let lc=0, rc=0;
    for (let s=1; s<=4; s++) {
      const nx=x+s*dx, ny=y+s*dy;
      if (inB(nx,ny) && b[ny][nx]===color) rc++; else break;
    }
    for (let s=1; s<=4; s++) {
      const nx=x-s*dx, ny=y-s*dy;
      if (inB(nx,ny) && b[ny][nx]===color) lc++; else break;
    }
    if (lc + rc + 1 !== 4) return false;
    const lx=x-(lc+1)*dx, ly=y-(lc+1)*dy;
    const rx=x+(rc+1)*dx, ry=y+(rc+1)*dy;
    return inB(lx,ly) && b[ly][lx]===null && inB(rx,ry) && b[ry][rx]===null;
  }

  function createsFourInDir(b, x, y, dx, dy, color) {
    for (let s=-4; s<=4; s++) {
      if (s===0) continue;
      const nx=x+s*dx, ny=y+s*dy;
      if (!inB(nx,ny) || b[ny][nx]!==null) continue;
      b[ny][nx] = color;
      const c = countConsec(b, x, y, dx, dy, color);
      b[ny][nx] = null;
      if (c === 5) return true;
    }
    return false;
  }

  function createsOpenThreeInDir(b, x, y, dx, dy, color) {
    for (let s=-4; s<=4; s++) {
      if (s===0) continue;
      const nx=x+s*dx, ny=y+s*dy;
      if (!inB(nx,ny) || b[ny][nx]!==null) continue;
      b[ny][nx] = color;
      const isOf = isOpenFourAt(b, x, y, dx, dy, color);
      b[ny][nx] = null;
      if (isOf) return true;
    }
    return false;
  }

  function isForbidden(b, x, y) {
    const m = maxConsec(b, x, y, 'B');
    if (m === 5) return false;
    if (m >= 6) return true;
    let fours = 0, openThrees = 0;
    for (const [dx,dy] of DIRS) {
      if (createsFourInDir(b,x,y,dx,dy,'B')) fours++;
      if (createsOpenThreeInDir(b,x,y,dx,dy,'B')) openThrees++;
    }
    if (fours >= 2) return true;
    if (openThrees >= 2) return true;
    return false;
  }

  function checkForbiddenAt(x, y) {
    if (board[y][x] !== null) return false;
    if (current !== 'B' || !renjuMode || gameOver) return false;
    board[y][x] = 'B';
    const f = isForbidden(board, x, y);
    board[y][x] = null;
    return f;
  }

  // ============================================================
  // AI 모듈
  // ============================================================
  // 패턴 점수표 (B = AI/평가 대상, O = 상대, . = 빈, # = 벽)
  // 사용자 요청: 연속 4 (BBBB) 가 갭 4 (B.BBB / BB.BB / BBB.B) 보다 명확히 우선
  const SCORE_TABLE = [
    ['BBBBB',   1e8],                 // 5목
    ['.BBBB.',  5e6],                 // 활4 — 사실상 승
    ['.BBBB#',  1e5], ['#BBBB.', 1e5], // 닫힌 4 (벽)
    ['.BBBBO',  1e5], ['OBBBB.', 1e5], // 닫힌 4 (상대)
    ['BB.BB',   2e4],                 // 갭 4 (단일 위협만)
    ['B.BBB',   2e4], ['BBB.B', 2e4],
    ['.BBB.',   3e3],                 // 활3
    ['.BB.B.',  3e3], ['.B.BB.', 3e3],
    ['.BBB#',   200], ['#BBB.', 200],
    ['.BBBO',   200], ['OBBB.', 200],
    ['.BB.',    50],                  // 활2
    ['.B.B.',   30]
  ];

  function getAllLines(b) {
    const lines = [];
    for (let y = 0; y < SIZE; y++) lines.push(b[y].slice());
    for (let x = 0; x < SIZE; x++) {
      const col = []; for (let y = 0; y < SIZE; y++) col.push(b[y][x]);
      lines.push(col);
    }
    for (let s = -(SIZE - 1); s <= SIZE - 1; s++) {
      const d = [];
      for (let y = 0; y < SIZE; y++) {
        const x = y + s;
        if (x >= 0 && x < SIZE) d.push(b[y][x]);
      }
      if (d.length >= 5) lines.push(d);
    }
    for (let s = 0; s < 2 * SIZE - 1; s++) {
      const d = [];
      for (let y = 0; y < SIZE; y++) {
        const x = s - y;
        if (x >= 0 && x < SIZE) d.push(b[y][x]);
      }
      if (d.length >= 5) lines.push(d);
    }
    return lines;
  }

  function lineToCanon(line, color) {
    let s = '#';
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      s += (c === null) ? '.' : (c === color) ? 'B' : 'O';
    }
    return s + '#';
  }

  function scoreCanonical(canon) {
    let total = 0;
    for (let i = 0; i < SCORE_TABLE.length; i++) {
      const pat = SCORE_TABLE[i][0], val = SCORE_TABLE[i][1];
      let pos = -1;
      while ((pos = canon.indexOf(pat, pos + 1)) !== -1) total += val;
    }
    return total;
  }

  function evalBoard(b, color) {
    const opp = color === 'B' ? 'W' : 'B';
    let me = 0, you = 0;
    const lines = getAllLines(b);
    for (let i = 0; i < lines.length; i++) {
      me  += scoreCanonical(lineToCanon(lines[i], color));
      you += scoreCanonical(lineToCanon(lines[i], opp));
    }
    // 상대 위협을 살짝 더 무겁게 (수비 우선) — 1.1배
    return me - 1.1 * you;
  }

  function getCandidates(b, radius) {
    const set = new Set();
    let any = false;
    for (let y = 0; y < SIZE; y++) {
      for (let x = 0; x < SIZE; x++) {
        if (b[y][x] === null) continue;
        any = true;
        for (let dy = -radius; dy <= radius; dy++) {
          for (let dx = -radius; dx <= radius; dx++) {
            const nx = x + dx, ny = y + dy;
            if (!inB(nx, ny)) continue;
            if (b[ny][nx] === null) set.add(ny * SIZE + nx);
          }
        }
      }
    }
    if (!any) return [{ x: 7, y: 7 }];
    return [...set].map(i => ({ x: i % SIZE, y: Math.floor(i / SIZE) }));
  }

  function filterRenjuForbidden(b, candidates, color) {
    if (!renjuMode || color !== 'B') return candidates;
    return candidates.filter(({ x, y }) => {
      b[y][x] = 'B';
      const f = isForbidden(b, x, y);
      b[y][x] = null;
      return !f;
    });
  }

  // 자리 (x, y) 를 actorColor 가 두는 게 합법인지 (렌주+흑 금수 검사)
  function isCellLegalFor(b, x, y, actorColor) {
    if (!renjuMode || actorColor !== 'B') return true;
    b[y][x] = 'B';
    const f = isForbidden(b, x, y);
    b[y][x] = null;
    return !f;
  }

  // 즉시 5목 만드는 수 찾기 — actorColor 가 둘 수 있는 자리만
  function findWinMove(b, threatColor, actorColor) {
    if (!actorColor) actorColor = threatColor;
    for (let y = 0; y < SIZE; y++) {
      for (let x = 0; x < SIZE; x++) {
        if (b[y][x] !== null) continue;
        b[y][x] = threatColor;
        const w = (threatColor === 'B' && renjuMode)
                    ? (maxConsec(b, x, y, threatColor) === 5)
                    : (maxConsec(b, x, y, threatColor) >= 5);
        b[y][x] = null;
        if (!w) continue;
        if (!isCellLegalFor(b, x, y, actorColor)) continue;
        return { x, y };
      }
    }
    return null;
  }

  // 활4 만드는 수 — actorColor 가 둘 수 있는 자리만
  function findOpen4Move(b, threatColor, actorColor) {
    if (!actorColor) actorColor = threatColor;
    for (let y = 0; y < SIZE; y++) {
      for (let x = 0; x < SIZE; x++) {
        if (b[y][x] !== null) continue;
        b[y][x] = threatColor;
        let isOf = false;
        for (let i = 0; i < DIRS.length; i++) {
          if (isOpenFourAt(b, x, y, DIRS[i][0], DIRS[i][1], threatColor)) {
            isOf = true; break;
          }
        }
        b[y][x] = null;
        if (!isOf) continue;
        if (!isCellLegalFor(b, x, y, actorColor)) continue;
        return { x, y };
      }
    }
    return null;
  }

  // 다중 위협 보너스 — 4-3 / 4-4 / 3-3 / 장목 / 연속 4 우대
  // 사용자 요청: 4-3 도 4-4 와 유사한 매우 높은 점수
  function bonusForMove(b, x, y, color) {
    // assumes b[y][x] === color
    let consecutiveFours = 0, gappedFours = 0, openThrees = 0;
    let maxRun = 0;
    for (let i = 0; i < DIRS.length; i++) {
      const dx = DIRS[i][0], dy = DIRS[i][1];
      const r = countConsec(b, x, y, dx, dy, color);
      if (r > maxRun) maxRun = r;
      if (r === 4) {
        consecutiveFours++;            // 이 방향에서 BBBB (연속 4)
      } else if (createsFourInDir(b, x, y, dx, dy, color)) {
        gappedFours++;                 // 이 방향에서 갭 4 (B.BBB 등)
      }
      if (createsOpenThreeInDir(b, x, y, dx, dy, color)) openThrees++;
    }
    const totalFours = consecutiveFours + gappedFours;
    const isBlack = color === 'B';
    let bonus = 0;

    // 5목
    if (maxRun === 5) bonus += 1e8;
    // 장목 (백/free 만)
    if (maxRun >= 6 && (!renjuMode || !isBlack)) bonus += 5e7;

    // 4-4 — 즉시 승 (백/free 만; 흑+렌주는 filter)
    if (totalFours >= 2 && (!renjuMode || !isBlack)) bonus += 5e6;
    // 4-3 — 2-3수 후 승 (사용자 요청: 4-4 와 유사한 점수)
    if (totalFours >= 1 && openThrees >= 1) bonus += 4e6;
    // 3-3 — 3-4수 후 승 (백/free 만)
    if (openThrees >= 2 && (!renjuMode || !isBlack)) bonus += 1.5e6;

    // 연속 4 우대 — 갭 4 보다 5배 점수
    if (consecutiveFours >= 1) bonus += 5e4 * consecutiveFours;
    // 갭 4 도 약간 (단일 위협)
    if (gappedFours >= 1) bonus += 1e4 * gappedFours;

    return bonus;
  }

  // 1-ply 평가 — 위치 + 다중 위협 + 패턴 점수 (try/finally 로 보드 보호)
  function quickEval(b, x, y, color) {
    let base, myBonus;
    b[y][x] = color;
    try {
      base = evalBoard(b, color);
      myBonus = bonusForMove(b, x, y, color);
    } finally { b[y][x] = null; }

    // 상대가 이 자리에 두면 얻는 위협 (방어 가치)
    const opp = color === 'B' ? 'W' : 'B';
    let oppBonus;
    b[y][x] = opp;
    try { oppBonus = bonusForMove(b, x, y, opp); }
    finally { b[y][x] = null; }

    // 위치 보너스 — 마지막 수 근처 + 중심 선호
    let posBonus = 0;
    if (lastMove) {
      const md = Math.abs(x - lastMove.x) + Math.abs(y - lastMove.y);
      posBonus += Math.max(0, 5 - md) * 40;
    }
    const cd = Math.abs(x - 7) + Math.abs(y - 7);
    posBonus -= cd * 2;

    return base + myBonus + 0.9 * oppBonus + posBonus;
  }

  // 후보 + 금수 제외. 반경 단계적 확장. 합법 수가 없으면 null
  function getLegalCandidates(b, color, startRadius) {
    for (let r = startRadius; r <= 7; r++) {
      let cands = getCandidates(b, r);
      cands = filterRenjuForbidden(b, cands, color);
      if (cands.length > 0) return cands;
    }
    // 마지막 수단: 보드 전체 빈 칸 + 필터
    const all = [];
    for (let y = 0; y < SIZE; y++) {
      for (let x = 0; x < SIZE; x++) {
        if (b[y][x] === null) all.push({ x, y });
      }
    }
    const filtered = filterRenjuForbidden(b, all, color);
    return filtered.length > 0 ? filtered : null;  // 진짜 둘 곳 없음
  }

  // 쉬움 — 규칙 기반
  function aiMoveEasy(b, color) {
    const opp = color === 'B' ? 'W' : 'B';
    const myWin   = findWinMove(b, color, color);    if (myWin)   return myWin;
    const oppWin  = findWinMove(b, opp, color);      if (oppWin)  return oppWin;
    const myOpen4 = findOpen4Move(b, color, color);  if (myOpen4) return myOpen4;
    const oppOpen4= findOpen4Move(b, opp, color);    if (oppOpen4)return oppOpen4;
    const cands = getLegalCandidates(b, color, 1);
    if (!cands) return null;  // 모든 자리 금수 — AI 패배
    return cands[Math.floor(Math.random() * cands.length)];
  }

  // 보통 — 1-ply quickEval 로 최고 수 선택 (다중 위협 보너스 포함)
  function aiMoveMedium(b, color) {
    const opp = color === 'B' ? 'W' : 'B';
    const myWin   = findWinMove(b, color, color);    if (myWin)   return myWin;
    const oppWin  = findWinMove(b, opp, color);      if (oppWin)  return oppWin;
    const myOpen4 = findOpen4Move(b, color, color);  if (myOpen4) return myOpen4;
    const oppOpen4= findOpen4Move(b, opp, color);    if (oppOpen4)return oppOpen4;
    const cands = getLegalCandidates(b, color, 2);
    if (!cands) return null;
    let best = cands[0], bestScore = -Infinity;
    for (const m of cands) {
      const sc = quickEval(b, m.x, m.y, color);
      if (sc > bestScore) { bestScore = sc; best = m; }
    }
    return best;
  }

  // α-β 탐색 (어려움용)
  // 시간 초과 시 throw 'TIMEOUT' — try/finally 로 항상 보드 복원
  function alphabeta(b, depth, alpha, beta, isMax, aiCol, radius, deadline) {
    if (Date.now() > deadline || aiAbort) throw 'TIMEOUT';
    if (depth === 0) return evalBoard(b, aiCol);
    const opp = aiCol === 'B' ? 'W' : 'B';
    const turnCol = isMax ? aiCol : opp;
    let cands = getCandidates(b, radius);
    cands = filterRenjuForbidden(b, cands, turnCol);
    if (cands.length === 0) {
      // 합법 수 0개 — 현재 플레이어 패배 (렌주에서 흑 트랩 등)
      return turnCol === aiCol ? -1e8 : 1e8;
    }
    // 즉시 승리/패배 체크 (try/finally 보호)
    for (const m of cands) {
      b[m.y][m.x] = turnCol;
      let w;
      try {
        w = maxConsec(b, m.x, m.y, turnCol) >= 5;
      } finally { b[m.y][m.x] = null; }
      if (w) return isMax ? (1e7 + depth) : -(1e7 + depth);
    }
    if (isMax) {
      let v = -Infinity;
      for (const m of cands) {
        b[m.y][m.x] = turnCol;
        let r;
        try {
          r = alphabeta(b, depth - 1, alpha, beta, false, aiCol, radius, deadline);
        } finally { b[m.y][m.x] = null; }
        if (r > v) v = r;
        if (v > alpha) alpha = v;
        if (alpha >= beta) break;
      }
      return v;
    } else {
      let v = Infinity;
      for (const m of cands) {
        b[m.y][m.x] = turnCol;
        let r;
        try {
          r = alphabeta(b, depth - 1, alpha, beta, true, aiCol, radius, deadline);
        } finally { b[m.y][m.x] = null; }
        if (r < v) v = r;
        if (v < beta) beta = v;
        if (alpha >= beta) break;
      }
      return v;
    }
  }

  // 어려움 — 적응적 반경 + 5초 데드라인
  async function aiMoveHard(b, color) {
    const HARD_DEADLINE_MS = 5000;
    const deadline = Date.now() + HARD_DEADLINE_MS;
    const opp = color === 'B' ? 'W' : 'B';

    const myWin = findWinMove(b, color, color);   if (myWin) return myWin;
    const oppWin = findWinMove(b, opp, color);    if (oppWin) return oppWin;

    function searchOnce(radius, maxDepth) {
      let cands = getCandidates(b, radius);
      cands = filterRenjuForbidden(b, cands, color);
      if (cands.length === 0) {
        // 후보가 모두 금수면 더 넓은 반경 시도
        const allLegal = getLegalCandidates(b, color, radius + 1);
        if (!allLegal || allLegal.length === 0) return null;  // 진짜 둘 곳 없음
        cands = allLegal;
      }
      // 1-ply quickEval 로 정렬 (α-β 효율 ↑, 다중 위협 인식)
      const scored = cands.map(m => ({ m, s: quickEval(b, m.x, m.y, color) }))
                          .sort((a, b) => b.s - a.s);

      let best = scored[0].m, bestScore = -Infinity, alpha = -Infinity;
      for (const { m } of scored) {
        if (Date.now() > deadline || aiAbort) break;
        b[m.y][m.x] = color;
        let sc;
        try {
          sc = alphabeta(b, maxDepth - 1, alpha, Infinity, false, color, radius, deadline);
        } finally { b[m.y][m.x] = null; }   // 예외에도 무조건 복원
        if (sc > bestScore) { bestScore = sc; best = m; }
        if (sc > alpha) alpha = sc;
      }
      return { move: best, score: bestScore };
    }

    // 점수 → 승률 변환 — mid-game 변화 가시화 (S=100k, clamp ±2e6)
    // 0→50% / 10k→52.5% / 50k→62% / 100k→73% / 500k→99.3% / 4-3 이상→100%
    function sigmoid(x) {
      const clamped = Math.max(-2e6, Math.min(2e6, x));
      return 1 / (1 + Math.exp(-clamped / 100000));
    }

    // 1차 — 반경 2, 깊이 4 (iterative deepening)
    let result = null;
    for (let d = 1; d <= 4; d++) {
      try {
        setAIProgress('반경 2 · 깊이 ' + d);
        const r = searchOnce(2, d);
        if (r) result = r;
        await yieldUI();
        if (Date.now() > deadline) break;
      } catch(e) { if (e === 'TIMEOUT') break; else throw e; }
    }

    // 2차 — 불리하면 반경 3
    if (result && sigmoid(result.score) < 0.50 && Date.now() < deadline) {
      for (let d = 1; d <= 4; d++) {
        try {
          setAIProgress('반경 3 · 깊이 ' + d);
          const r = searchOnce(3, d);
          if (r) result = r;
          await yieldUI();
          if (Date.now() > deadline) break;
        } catch(e) { if (e === 'TIMEOUT') break; else throw e; }
      }
    }

    // 3차 — 크게 불리하면 반경 4 (깊이는 절약)
    if (result && sigmoid(result.score) < 0.40 && Date.now() < deadline) {
      for (let d = 1; d <= 3; d++) {
        try {
          setAIProgress('반경 4 · 깊이 ' + d);
          const r = searchOnce(4, d);
          if (r) result = r;
          await yieldUI();
          if (Date.now() > deadline) break;
        } catch(e) { if (e === 'TIMEOUT') break; else throw e; }
      }
    }

    if (result) updateWinProb(result.score, color);
    return result ? result.move : aiMoveMedium(b, color);
  }

  function setAIProgress(text) { if (aiProgressEl) aiProgressEl.textContent = text; }
  function yieldUI() { return new Promise(r => setTimeout(r, 0)); }

  function updateWinProb(score, aiCol) {
    if (!showWinProb) return;
    const clamped = Math.max(-2e6, Math.min(2e6, score));
    const p = 1 / (1 + Math.exp(-clamped / 100000));
    aiWinprobValueEl.textContent = (p * 100).toFixed(0) + '%';
    aiWinprobFillEl.style.width = (p * 100).toFixed(1) + '%';
  }

  async function runAI() {
    if (aiBusy || gameOver || mode !== 'pvc' || current !== aiColor) return;
    aiBusy = true;
    aiAbort = false;
    aiThinkingEl.style.display = '';
    setAIProgress('');
    await yieldUI();

    let move = null;
    try {
      if (aiDifficulty === 'easy')        move = aiMoveEasy(board, aiColor);
      else if (aiDifficulty === 'medium') move = aiMoveMedium(board, aiColor);
      else                                move = await aiMoveHard(board, aiColor);
    } catch(e) {
      console.warn('AI fallback:', e);
      try { move = aiMoveMedium(board, aiColor); } catch(_) {}
    }

    // 합법 수가 없는 경우 (예: 렌주에서 흑이 모든 자리 금수)
    if (!move) {
      gameOver = true;
      winner = (aiColor === 'B') ? 'W' : 'B';
      aiBusy = false;
      aiThinkingEl.style.display = 'none';
      if (showWinProb) updateWinProb(-1e8, aiColor);  // 0%
      flashStatus(aiColor === 'B'
        ? '🚫 흑(컴퓨터)이 둘 자리가 없습니다 — 백 승!'
        : '🚫 백(컴퓨터)이 둘 자리가 없습니다 — 흑 승!');
      render();
      return;
    }

    // 승률 표시 (hard 는 search 내부에서 이미 갱신)
    if (showWinProb && aiDifficulty !== 'hard') {
      board[move.y][move.x] = aiColor;
      const sc = evalBoard(board, aiColor) + bonusForMove(board, move.x, move.y, aiColor);
      board[move.y][move.x] = null;
      updateWinProb(sc, aiColor);
    }

    try {
      if (!aiAbort) placeStone(move.x, move.y);
    } finally {
      aiBusy = false;
      aiThinkingEl.style.display = 'none';
    }
  }

  // ============================================================

  function placeStone(x, y) {
    if (gameOver || !inB(x,y) || board[y][x] !== null) return;

    if (renjuMode && current === 'B') {
      board[y][x] = 'B';
      const f = isForbidden(board, x, y);
      if (f) {
        board[y][x] = null;
        flashStatus(t('forbidden'));
        return;
      }
      board[y][x] = null;
    }

    board[y][x] = current;
    const m = { x, y, color: current };
    history.push(m);
    redoStack = [];
    lastMove = m;

    const run = maxConsec(board, x, y, current);
    let win = false;
    if (current === 'B' && renjuMode) {
      if (run === 5) win = true;
    } else {
      if (run >= 5) win = true;
    }

    if (win) { gameOver = true; winner = current; }
    else { current = (current === 'B') ? 'W' : 'B'; }

    render();

    // PvC: 인간이 두고 나면 AI 차례 자동 진행
    if (mode === 'pvc' && !gameOver && !aiBusy && current === aiColor) {
      setTimeout(runAI, 80);
    }
  }

  function refreshAIWinProb() {
    if (mode !== 'pvc' || !showWinProb) return;
    // 보드 상태에서 AI 관점의 평가 — 마지막 수 보너스도 반영
    let score = evalBoard(board, aiColor);
    if (lastMove && lastMove.color === aiColor) {
      score += bonusForMove(board, lastMove.x, lastMove.y, aiColor);
    }
    updateWinProb(score, aiColor);
  }

  function undo() {
    if (aiBusy || history.length === 0) return;
    // PvC 에서는 AI 응수까지 함께 되돌리기 위해 두 수 pop
    const popsNeeded = (mode === 'pvc' && history.length >= 2) ? 2 : 1;
    for (let i = 0; i < popsNeeded; i++) {
      if (history.length === 0) break;
      const m = history.pop();
      board[m.y][m.x] = null;
      redoStack.push(m);
      current = m.color;
    }
    gameOver = false;
    winner = null;
    lastMove = history.length ? history[history.length-1] : null;
    refreshAIWinProb();
    render();
  }

  function redo() {
    if (aiBusy || redoStack.length === 0) return;
    const pushesNeeded = (mode === 'pvc' && redoStack.length >= 2) ? 2 : 1;
    for (let i = 0; i < pushesNeeded; i++) {
      if (redoStack.length === 0) break;
      const m = redoStack.pop();
      board[m.y][m.x] = m.color;
      history.push(m);
      lastMove = m;
      const run = maxConsec(board, m.x, m.y, m.color);
      const isWin = (m.color === 'B' && renjuMode) ? (run === 5) : (run >= 5);
      if (isWin) {
        gameOver = true; winner = m.color;
        break;  // 게임 끝났으면 추가 redo 안 함
      } else {
        current = (m.color === 'B') ? 'W' : 'B';
        gameOver = false; winner = null;
      }
    }
    refreshAIWinProb();
    render();
  }

  function flashStatus(msg) {
    statusEl.innerHTML = msg;
    statusEl.style.background = 'rgba(220,38,38,0.20)';
    statusEl.style.borderLeftColor = '#dc2626';
    if (statusFlashT) clearTimeout(statusFlashT);
    statusFlashT = setTimeout(() => updateStatusUI(), 1500);
  }

  function updateStatusUI() {
    if (gameOver) {
      const ind = winner === 'B'
        ? '<span class="omok-stone-mini stone-b"></span>' + t('blackWin')
        : '<span class="omok-stone-mini stone-w"></span>' + t('whiteWin');
      statusEl.innerHTML = ind;
      statusEl.style.background = 'rgba(34,197,94,0.20)';
      statusEl.style.borderLeftColor = '#22c55e';
    } else {
      const ind = current === 'B'
        ? '<span class="omok-stone-mini stone-b"></span>' + t('blackTurn')
        : '<span class="omok-stone-mini stone-w"></span>' + t('whiteTurn');
      statusEl.innerHTML = ind;
      statusEl.style.background = 'rgba(59,130,246,0.12)';
      statusEl.style.borderLeftColor = '#3b82f6';
    }
    undoBtn.disabled = (history.length === 0);
    redoBtn.disabled = (redoStack.length === 0);
  }

  function recomputeGeometry() {
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    const cssW = rect.width || 600;
    const cssH = rect.height || 600;
    canvas.width = Math.round(cssW * dpr);
    canvas.height = Math.round(cssH * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    padding = cssW * 0.04;
    cellSize = (cssW - 2 * padding) / (SIZE - 1);
    return { w: cssW, h: cssH };
  }

  function cellToPx(x, y) {
    return { px: padding + x * cellSize, py: padding + y * cellSize };
  }
  function pxToCell(px, py) {
    return { x: Math.round((px - padding) / cellSize),
             y: Math.round((py - padding) / cellSize) };
  }

  function render() {
    const { w, h } = recomputeGeometry();
    ctx.fillStyle = '#d8b173';
    ctx.fillRect(0, 0, w, h);

    ctx.strokeStyle = '#3a2a18';
    ctx.lineWidth = 1;
    ctx.beginPath();
    for (let i=0; i<SIZE; i++) {
      const a = cellToPx(i, 0), b = cellToPx(i, SIZE-1);
      ctx.moveTo(a.px, a.py); ctx.lineTo(b.px, b.py);
      const c = cellToPx(0, i), d = cellToPx(SIZE-1, i);
      ctx.moveTo(c.px, c.py); ctx.lineTo(d.px, d.py);
    }
    ctx.stroke();

    const stars = [[3,3],[3,11],[7,7],[11,3],[11,11]];
    ctx.fillStyle = '#3a2a18';
    for (const [sx, sy] of stars) {
      const p = cellToPx(sx, sy);
      ctx.beginPath();
      ctx.arc(p.px, p.py, Math.max(2.5, cellSize*0.08), 0, Math.PI*2);
      ctx.fill();
    }

    if (renjuMode && current === 'B' && !gameOver) {
      ctx.strokeStyle = '#dc2626';
      ctx.lineWidth = 2;
      for (let yy=0; yy<SIZE; yy++) {
        for (let xx=0; xx<SIZE; xx++) {
          if (board[yy][xx] !== null) continue;
          if (!checkForbiddenAt(xx, yy)) continue;
          const p = cellToPx(xx, yy);
          const r = cellSize * 0.28;
          ctx.beginPath();
          ctx.moveTo(p.px - r, p.py - r); ctx.lineTo(p.px + r, p.py + r);
          ctx.moveTo(p.px + r, p.py - r); ctx.lineTo(p.px - r, p.py + r);
          ctx.stroke();
        }
      }
    }

    for (let yy=0; yy<SIZE; yy++) {
      for (let xx=0; xx<SIZE; xx++) {
        const v = board[yy][xx];
        if (v === null) continue;
        const p = cellToPx(xx, yy);
        const r = cellSize * 0.42;
        ctx.beginPath();
        ctx.arc(p.px, p.py, r, 0, Math.PI*2);
        ctx.fillStyle = (v === 'B') ? '#1a1a1a' : '#f5f5f5';
        ctx.fill();
        ctx.strokeStyle = '#000';
        ctx.lineWidth = 1;
        ctx.stroke();
      }
    }

    if (lastMove) {
      const p = cellToPx(lastMove.x, lastMove.y);
      ctx.strokeStyle = '#dc2626';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(p.px, p.py, cellSize * 0.18, 0, Math.PI*2);
      ctx.stroke();
    }

    updateStatusUI();
    renderHistory();
    if (ruleInfoEl) {
      ruleInfoEl.textContent = t('rulePrefix') + (renjuMode ? t('rNameRenju') : t('rNameFree'));
    }
  }

  function renderHistory() {
    if (history.length === 0) {
      histEl.innerHTML = '<div style="opacity:0.6">' + t('noHistory') + '</div>';
      return;
    }
    const items = history.map((m, i) => {
      const ind = m.color === 'B' ? '●' : '○';
      const xL = String.fromCharCode(65 + m.x);
      const cur = (i === history.length-1) ? ' cur' : '';
      return '<div class="omok-history-item' + cur + '">' +
             (i+1) + '. ' + ind + ' ' + xL + (m.y+1) + '</div>';
    }).join('');
    histEl.innerHTML = items;
    histEl.scrollTop = histEl.scrollHeight;
  }

  // Events
  canvas.addEventListener('click', (e) => {
    if (gameOver) return;
    // PvC 에서 AI 차례 (계산 중이거나 곧 시작) 에는 사람 클릭 차단
    if (mode === 'pvc' && current === aiColor) return;
    if (aiBusy) return;
    const rect = canvas.getBoundingClientRect();
    const px = e.clientX - rect.left;
    const py = e.clientY - rect.top;
    const { x, y } = pxToCell(px, py);
    placeStone(x, y);
  });

  resetBtn.addEventListener('click', () => {
    init();
    // PvC + AI가 흑(선공)인 경우 자동 첫 수
    if (mode === 'pvc' && current === aiColor && !gameOver) {
      setTimeout(runAI, 200);
    }
  });
  undoBtn.addEventListener('click', undo);
  redoBtn.addEventListener('click', redo);
  settingsBtn.addEventListener('click', () => {
    if (history.length > 0 && !gameOver) {
      if (!confirm(t('confirmAbandon'))) return;
    }
    aiAbort = true;
    aiBusy = false;
    aiThinkingEl.style.display = 'none';
    showStart();
  });
  window.addEventListener('resize', () => render());

  // 옵션 버튼 클릭 → 그룹 내 active 갱신
  startOverlay.addEventListener('click', function(e) {
    var b = e.target.closest('.opt-btn');
    if (!b) return;
    var group = b.dataset.group;
    setActiveBtn(group, b.dataset.value);
    if (group === 'lang') {
      currentLang = b.dataset.value;
      applyLang();
    }
    if (group === 'mode') {
      pvcOptionsEl.style.display = (b.dataset.value === 'pvc') ? '' : 'none';
    }
  });

  startBtn.addEventListener('click', () => {
    const ruleVal = getActiveValue('rule') || 'renju';
    const langVal = getActiveValue('lang') || 'ko';
    const modeVal = getActiveValue('mode') || 'pvp';
    renjuMode = (ruleVal === 'renju');
    currentLang = langVal;
    mode = modeVal;
    if (mode === 'pvc') {
      let acVal = getActiveValue('aiColor') || 'W';
      if (acVal === 'random') acVal = (Math.random() < 0.5) ? 'B' : 'W';
      aiColor = acVal;
      aiDifficulty = getActiveValue('aiDiff') || 'medium';
      showWinProb = (getActiveValue('winProb') || 'show') === 'show';
    }
    applyLang();
    init();
    hideStart();
    // 승률 패널 표시 여부
    aiWinprobEl.style.display = (mode === 'pvc' && showWinProb) ? '' : 'none';
    // AI 가 흑(선공)이면 즉시 첫 수
    if (mode === 'pvc' && current === aiColor && !gameOver) {
      setTimeout(runAI, 200);
    }
  });

  // First load: show start screen, prepare default lang
  applyLang();
  init();
  showStart();
})();
</script>
