# ============================================================
# 사이트 기본 정보
# ============================================================
title: "이태영의 물리노트"
name: "이태영(Taeyoung Lee)"
description: "전산다체물리 연구 노트 — 텐서 네트워크, 양자 알고리즘, 그리고 물리학 이야기"
url: "https://taeyoungphys.github.io"
repository: "taeyoungphys/taeyoungphys.github.io"

github_username: taeyoungphys
minimal_mistakes_skin: "dark"
search: true
locale: "ko-KR"
logo: "/assets/images/logo.svg"

# 링크 미리보기 (Open Graph / Twitter Card)
og_image: "/assets/images/og-image.png"
twitter:
  username: "taeyoungphys"

# Firebase (Sudoku 전역 리더보드용)
# 주의: 이 키들은 클라이언트 사이드에 노출되도록 설계된 공개 키입니다.
# 보안은 Firebase Realtime Database 의 보안 규칙으로 강제됩니다.
firebase:
  apiKey: "AIzaSyDqn9XkGAB0OjR1KHb919Ys36y1jrGzg4A"
  authDomain: "leaderboard-e5515.firebaseapp.com"
  databaseURL: "https://leaderboard-e5515-default-rtdb.asia-southeast1.firebasedatabase.app"
  projectId: "leaderboard-e5515"
  appId: "1:778268708310:web:19868f26022eeb422d6877"

# ============================================================
# 빌드 설정
# ============================================================
markdown: kramdown
kramdown:
  math_engine: mathjax
remote_theme: mmistakes/minimal-mistakes

permalink: /:categories/:title/
paginate: 10
paginate_path: /page:num/
timezone: Asia/Seoul

include:
  - _pages

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor

# ============================================================
# 플러그인
# ============================================================
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache

# ============================================================
# 저자 정보
# ============================================================
author:
  name   : "이태영의 물리노트"
  bio    : "<a href='/about/' style='font-size:0.85em;'>더보기 →</a>"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/taeyoungphys"
    - label: "Email"
      icon: "fas fa-fw fa-envelope-square"
      url: "mailto:tleephys@gmail.com"

atom_feed:
  hide: true

# ============================================================
# 푸터
# ============================================================
footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/taeyoungphys"

# ============================================================
# 기본값 (defaults)
# ============================================================
defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true
      toc: true
      toc_sticky: true
  # _pages
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true

# ============================================================
# 아카이브
# ============================================================
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/
