# ============================================================
# 사이트 기본 정보
# ============================================================
title: "이태영의 물리 노트"
subtitle: "Computational Many-Body Physics"
name: "이태영"
description: "전산다체물리 연구 노트 & 포트폴리오 — 텐서 네트워크, 최소 작용 원리, 그리고 물리학 이야기"
url: "https://taeyoungphys.github.io"
repository: "taeyoungphys/taeyoungphys.github.io"

github_username: taeyoungphys
minimal_mistakes_skin: "dark"
search: true
locale: "ko-KR"

# ============================================================
# 빌드 설정
# ============================================================
markdown: kramdown
kramdown:
  math_engine: mathjax
remote_theme: mmistakes/minimal-mistakes

permalink: /:categories/:title/
paginate: 10
paginate_path: /page:num/
timezone: Asia/Seoul

include:
  - _pages

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor

# ============================================================
# 플러그인
# ============================================================
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache

# ============================================================
# 저자 정보
# ============================================================
author:
  name   : "이태영"
  bio    : "물리학 대학원생 · 전산다체물리 · 텐서 네트워크"
  location: "South Korea"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/taeyoungphys"
    - label: "티스토리"
      icon: "fas fa-fw fa-blog"
      url: "https://redinggoding.tistory.com"
    - label: "Email"
      icon: "fas fa-fw fa-envelope-square"
      url: "mailto:tleephys@gmail.com"

# ============================================================
# 푸터
# ============================================================
footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/taeyoungphys"
    - label: "티스토리"
      icon: "fas fa-fw fa-blog"
      url: "https://redinggoding.tistory.com"

# ============================================================
# 기본값 (defaults)
# ============================================================
defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true
      toc: true
      toc_sticky: true
  # _pages
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true

# ============================================================
# 아카이브
# ============================================================
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/
